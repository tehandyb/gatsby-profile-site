version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 16
        - node --version
        - yarn install --ignore-engines
    build:
      commands:
        - nvm use 16
        - yarn build
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
